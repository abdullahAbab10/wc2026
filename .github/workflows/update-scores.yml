name: Update World Cup Scores
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Update scores
        run: |
          curl -sf "https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json" -o /tmp/wc.json || echo '{"matches":[]}' > /tmp/wc.json
          python3 -c "
import json,datetime,os
with open('/tmp/wc.json') as f: d=json.load(f)
out={'updated':datetime.datetime.utcnow().isoformat()+'Z','matches':[]}
for m in d.get('matches',[]):
  s=m.get('score',{})
  out['matches'].append({'team1':m.get('team1',''),'team2':m.get('team2',''),'score':s.get('ft'),'ht':s.get('ht'),'goals1':m.get('goals1',[]),'goals2':m.get('goals2',[]),'status':'FINISHED' if s.get('ft') else 'SCHEDULED','live':False})
os.makedirs('data',exist_ok=True)
open('data/results.json','w').write(json.dumps(out,ensure_ascii=False))
print('Done:',len(out['matches']),'matches')
"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/results.json
          git diff --staged --quiet || git commit -m "update scores"
          git push
