name: Update World Cup Scores

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
  - name: Checkout repo
    uses: actions/checkout@v4

  - name: Fetch & merge scores
    run: |
      mkdir -p data

      curl -sf --max-time 15 \
        "https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json" \
        -o data/ofb_raw.json || echo '{"matches":[]}' > data/ofb_raw.json

      curl -sf --max-time 15 \
        -H "X-Auth-Token: a6e2d0ce5b074ef5b888f9069eb53074" \
        -H "X-Unfold-Goals: true" \
        "https://api.football-data.org/v4/competitions/WC/matches" \
        -o data/fdorg_raw.json || echo '{"matches":[]}' > data/fdorg_raw.json

      python3 << 'PYEOF'
      import json, re, unicodedata, datetime

      def norm(s):
          if not s: return ''
          s = str(s)
          s = s.replace('Czech Republic','Czechia').replace('Korea Republic','South Korea')
          s = s.replace('IR Iran','Iran').replace('Turkiye','Turkiye')
          s = s.replace("Cote d'Ivoire",'Ivory Coast').replace('Curacao','Curacao')
          s = unicodedata.normalize('NFD', s)
          s = ''.join(c for c in s if unicodedata.category(c) != 'Mn')
          return re.sub(r'[^a-z]','', s.lower())

      with open('data/ofb_raw.json') as f:
          ofb = json.load(f)
      with open('data/fdorg_raw.json') as f:
          fdorg = json.load(f)

      results = {}

      for m in ofb.get('matches', []):
          t1, t2 = norm(m.get('team1','')), norm(m.get('team2',''))
          if not t1 or not t2: continue
          score = m.get('score', {})
          results[t1+'_'+t2] = {
              'team1': m.get('team1',''), 'team2': m.get('team2',''),
              'score': score.get('ft'), 'ht': score.get('ht'),
              'goals1': m.get('goals1',[]), 'goals2': m.get('goals2',[]),
              'status': 'FINISHED' if score.get('ft') else 'SCHEDULED',
              'live': False, 'minute': None
          }

      for m in fdorg.get('matches', []):
          hn = m.get('homeTeam',{}).get('name','')
          an = m.get('awayTeam',{}).get('name','')
          t1, t2 = norm(hn), norm(an)
          if not t1 or not t2: continue
          key = t1+'_'+t2
          status = m.get('status','')
          live = status in ('IN_PLAY','PAUSED','HALFTIME')
          fts = m.get('score',{}).get('fullTime',{})
          hts = m.get('score',{}).get('halfTime',{})
          g1,g2,rc1,rc2=[],[],[],[]
          for g in m.get('goals',[]):
              side='home' if m.get('homeTeam',{}).get('id')==g.get('team',{}).get('id') else 'away'
              mn=str(g.get('minute',''))+('+'+str(g.get('minuteExtra','')) if g.get('minuteExtra') else '')
              obj={'name':g.get('scorer',{}).get('name',''),'minute':mn}
              if side=='home': g1.append(obj)
              else: g2.append(obj)
          for b in m.get('bookings',[]):
              if b.get('card') in ('RED_CARD','YELLOW_RED_CARD'):
                  side='home' if m.get('homeTeam',{}).get('id')==b.get('team',{}).get('id') else 'away'
                  obj={'name':b.get('player',{}).get('name',''),'minute':str(b.get('minute',''))}
                  if side=='home': rc1.append(obj)
                  else: rc2.append(obj)
          if key in results:
              e=results[key]
              if live or (status=='FINISHED' and not e.get('score')):
                  if fts.get('home') is not None: e['score']=[fts['home'],fts['away']]
                  if hts.get('home') is not None: e['ht']=[hts['home'],hts['away']]
              if live: e['live']=True; e['minute']=m.get('minute',''); e['status']='LIVE'
              if status=='FINISHED': e['status']='FINISHED'
              if g1 and not e.get('goals1'): e['goals1']=g1
              if g2 and not e.get('goals2'): e['goals2']=g2
              if rc1: e['rc1']=rc1
              if rc2: e['rc2']=rc2
          else:
              results[key]={'team1':hn,'team2':an,
                  'score':[fts['home'],fts['away']] if fts.get('home') is not None else None,
                  'ht':[hts['home'],hts['away']] if hts.get('home') is not None else None,
                  'goals1':g1,'goals2':g2,'rc1':rc1,'rc2':rc2,
                  'status':'LIVE' if live else status,'live':live,'minute':m.get('minute')}

      out={'updated':datetime.datetime.utcnow().isoformat()+'Z','matches':list(results.values())}
      with open('data/results.json','w') as f:
          json.dump(out, f, ensure_ascii=False)
      fin=sum(1 for m in out['matches'] if m.get('status')=='FINISHED')
      print(f"Done: {len(out['matches'])} matches, {fin} finished")
      PYEOF

  - name: Commit results.json
    run: |
      git config user.name "github-actions[bot]"
      git config user.email "github-actions[bot]@users.noreply.github.com"
      git add data/results.json
      git diff --staged --quiet || git commit -m "chore: update scores $(date -u +%H:%M)"
      git push
